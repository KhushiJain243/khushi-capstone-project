<!DOCTYPE html>
<html>
<head>
    <title>Money Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Money Manager</h2>

<button onclick="openForm()">Add Transaction</button>
<button onclick="downloadCSV()">Download CSV</button>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-box">

        <h3>Add Transaction</h3>

        <form id="form">

            <label>Amount</label>
            <input type="number" id="amount">
            <small id="amountError" class="error"></small>

            <label>Date</label>
            <input type="date" id="date">
            <small id="dateError" class="error"></small>

            <label>Type</label><br>
            <input type="radio" name="type" value="income"> Income
            <input type="radio" name="type" value="expense"> Expense
            <small id="typeError" class="error"></small>

            <label>Sub Category</label>
            <select id="subCategory">
                <option value="">Select</option>
            </select>
            <small id="catError" class="error"></small>

            <label>Description</label>
            <input type="text" id="desc">

            <br><br>
            <button type="submit">Save</button>
            <button type="button" onclick="closeForm()">Cancel</button>

        </form>
    </div>
</div>

<hr>

<!-- Filter -->
<select id="filter" onchange="showData()">
    <option value="all">All</option>
    <option value="income">Income</option>
    <option value="expense">Expense</option>
</select>

<button onclick="sortByAmount()">Sort by Amount</button>

<!-- Table -->
<table border="1">
    <thead>
        <tr>
            <th>Date</th>
            <th>Type</th>
            <th>Category</th>
            <th>Description</th>
            <th>Amount</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<hr>

<!-- Simple Chart -->
<h3>Expense Chart</h3>
<canvas id="chart" width="300" height="200"></canvas>

<script src="script.js"></script>

</body>
</html>
